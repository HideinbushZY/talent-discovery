name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: 单元 + 集成测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements-dev.txt

      - name: 跑测试（不触网、不需密钥）
        run: python -m pytest -q
